version: '3.8'
services:
  app:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: pos
      MYSQL_USER: pos
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
